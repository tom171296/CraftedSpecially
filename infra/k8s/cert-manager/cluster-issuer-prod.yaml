apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production — only switch here once staging has been validated.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "" # TODO: replace with a real contact email address
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: craftedspecially-gateway
                namespace: envoy-gateway-system
                kind: Gateway
