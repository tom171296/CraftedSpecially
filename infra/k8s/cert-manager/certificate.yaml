apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: craftedspecially-tls
  namespace: envoy-gateway-system
spec:
  secretName: craftedspecially-tls
  # TODO: replace with the FQDN from the Bicep deployment output (same value as the HTTPRoute hostname).
  # Expected format: craftedspecially-api.<region>.cloudapp.azure.com
  dnsNames:
    - "" # e.g. craftedspecially-api.westeurope.cloudapp.azure.com
  issuerRef:
    name: letsencrypt-staging  # Switch to letsencrypt-prod once validated.
    kind: ClusterIssuer
  # cert-manager will keep the certificate renewed at least 30 days before expiry.
  renewBefore: 720h # 30 days
