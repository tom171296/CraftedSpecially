apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: craftedspecially-api
  namespace: crafted-specially
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: craftedspecially-gateway
      namespace: envoy-gateway-system
      sectionName: https
  # FQDN from Bicep deployment output — retrieve with:
  #   az deployment group show --name deployPublicIp \
  #     --resource-group CraftedSpecially --query properties.outputs.fqdn.value -o tsv
  hostnames:
    - "craftedspecially-pip.eastus.cloudapp.azure.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - group: ''
          kind: Service
          name: crafted-specially-api
          port: 80
          weight: 1