apiVersion: apps/v1
kind: Deployment
metadata:
  name: crafted-specially-api
  namespace: crafted-specially
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crafted-specially
  template:
    metadata:
      labels:
        app: crafted-specially
    spec:
      containers:
        - name: crafted-specially-api
          image: craftedspeciallyacr.azurecr.io/crafted-specially:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      securityContext:
        runAsNonRoot: true
