apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: craftedspecially-api
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway
      name: craftedspecially-gateway
      namespace: envoy-gateway-system
      sectionName: https
  # TODO: replace with the FQDN from the Bicep deployment output:
  #   az deployment group show --name deployNetworking \
  #     --resource-group <rg> --query properties.outputs.gatewayFqdn.value -o tsv
  # Expected format: craftedspecially-api.<region>.cloudapp.azure.com
  hostnames:
    - "craftedspecially-api.eastus.cloudapp.azure.com" # e.g. craftedspecially-api.westeurope.cloudapp.azure.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''	
          kind: Service	
          name: craftedspecially-api
          port: 8080
          weight: 1
          # TODO: update port to match the Service port exposed by CraftedSpecially.Api
