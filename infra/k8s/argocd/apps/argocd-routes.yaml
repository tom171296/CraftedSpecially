apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/tom171296/CraftedSpecially.git
    targetRevision: main
    path: infra/k8s/argocd
    directory:
      include: "routes.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
