apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Helm release
    - repoURL: docker.io/envoyproxy/gateway-helm
      chart: gateway-helm
      targetRevision: v1.3.0
      helm:
        valueFiles:
          - $values/infra/k8s/envoy-gateway/values.yaml
    # Values file reference
    - repoURL: YOUR_REPO_SSH_URL  # e.g. git@github.com:org/CraftedSpecially.git
      targetRevision: main
      ref: values
    # GatewayClass and Gateway raw manifests
    - repoURL: YOUR_REPO_SSH_URL
      targetRevision: main
      path: infra/k8s/envoy-gateway
      directory:
        include: "gatewayclass.yaml,gateway.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
