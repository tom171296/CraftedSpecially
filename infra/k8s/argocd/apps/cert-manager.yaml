apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Helm release
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.16.3
      helm:
        valueFiles:
          - $values/infra/k8s/cert-manager/values.yaml
    # Values file and raw manifests (ClusterIssuers, Certificate)
    - repoURL: https://github.com/tom171296/CraftedSpecially.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/tom171296/CraftedSpecially.git
      targetRevision: main
      path: infra/k8s/cert-manager
      directory:
        include: "cluster-issuer-*.yaml,certificate.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
