apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: craftedspecially-gateway
  namespace: envoy-gateway-system
  annotations:
    # cert-manager will manage the TLS certificate for the HTTPS listener.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: envoy
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: craftedspecially-proxy-config
      namespace: envoy-gateway-system
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: craftedspecially-tls
            kind: Secret